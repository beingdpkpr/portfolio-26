  const { useState, useEffect, useRef } = React;

  function useInView(threshold = 0.15) {
    const ref = useRef(null);
    const [visible, setVisible] = useState(false);
    useEffect(() => {
      const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
      if (ref.current) obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);
    return [ref, visible];
  }

  function Reveal({ children, delay = 0, direction = "up" }) {
    const [ref, vis] = useInView();
    const transforms = { up: "translateY(32px)", left: "translateX(-32px)", right: "translateX(32px)", none: "none" };
    return (
      <div ref={ref} style={{
        opacity: vis ? 1 : 0,
        transform: vis ? "none" : transforms[direction],
        transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
      }}>{children}</div>
    );
  }

                        value={form[field]}
                        onChange={e => setForm(f => ({...f, [field]:e.target.value}))}
                        required rows={4}
                        style={{ ...inputStyle, resize:"none" }}
                        onFocus={e => e.target.style.borderBottomColor="#fff"}
                        onBlur={e => e.target.style.borderBottomColor="rgba(255,255,255,0.15)"}
                      />
                    </div>
                  ) : (
                    <div key={field}>
                      <input
                        type={type} placeholder={placeholder}
                        value={form[field]}
                        onChange={e => setForm(f => ({...f, [field]:e.target.value}))}
                        required style={inputStyle}
                        onFocus={e => e.target.style.borderBottomColor="#fff"}
                        onBlur={e => e.target.style.borderBottomColor="rgba(255,255,255,0.15)"}
                      />
                    </div>
                  )
                ))}
                <button type="submit" style={{
                  background:"#fff", color:"#000", border:"none", cursor:"pointer",
                  padding:"16px 40px", fontFamily:"'Space Grotesk',sans-serif",
                  fontWeight:700, fontSize:14, letterSpacing:"0.05em",
                  alignSelf:"flex-start", transition:"all 0.2s",
                }}
                onMouseEnter={e => e.target.style.background="#e0e0e0"}
                onMouseLeave={e => e.target.style.background="#fff"}>
                  SEND MESSAGE →
                </button>
              </form>
            )}
          </Reveal>

          <Reveal delay={0.2}>
            <div style={{ display:"flex", flexDirection:"column", gap:40 }}>
              {[
                ["Location", d.location],
                ["Email", d.email],
                ["Phone", d.phone],
                ["LinkedIn", d.linkedinLabel],
                ["GitHub", d.githubLabel],
              ].map(([label, val]) => (
                <div key={label} style={{ borderBottom:"1px solid rgba(255,255,255,0.06)", paddingBottom:24 }}>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#444", letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:8 }}>
                    {label}
                  </div>
                  <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:16, color:"#888" }}>
                    {val}
                  </div>
                </div>
              ))}
            </div>
          </Reveal>
        </div>

        <Reveal delay={0.3}>
          <div style={{
            marginTop:120, paddingTop:48, borderTop:"1px solid rgba(255,255,255,0.06)",
            display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16,
          }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#333", letterSpacing:"0.1em" }}>
              © 2025 DEEPAK KUMAR PRASAD
            </div>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#333", letterSpacing:"0.08em" }}>
              DESIGNED & BUILT WITH CARE
            </div>
          </div>
        </Reveal>
      </section>
    );
  }

  // ─── Main App ─────────────────────────────────────────────────────────────────

  function App() {
    const [activeSection, setActiveSection] = React.useState("hero");

    useEffect(() => {
      const sections = ["hero","about","experience","projects","skills","education","certifications","blog","contact"];
      const handler = () => {
        const scrollY = window.scrollY + 100;
        for (let i = sections.length - 1; i >= 0; i--) {
          const el = document.getElementById(sections[i]);
          if (el && el.offsetTop <= scrollY) {
            setActiveSection(sections[i]);
            break;
          }
        }
      };
      window.addEventListener("scroll", handler, { passive: true });
      return () => window.removeEventListener("scroll", handler);
    }, []);

    useEffect(() => {
      const saved = sessionStorage.getItem("portfolio-scroll");
      if (saved) window.scrollTo(0, parseInt(saved));
      const handler = () => sessionStorage.setItem("portfolio-scroll", window.scrollY);
      window.addEventListener("scroll", handler, { passive: true });
      return () => window.removeEventListener("scroll", handler);
    }, []);

    return (
      <div style={{ background:"#08080a", minHeight:"100vh", color:"#fff" }}>
        <Nav active={activeSection} />
        <Hero />
        <About />
        <Experience />
        <Projects />
        <Skills />
        <Education />
        <Certifications />
        <Blog />
        <Contact />
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  </script>
</body>
</html>
